# Docker Compose with Ollama (Free Local AI)
#
# This setup includes Ollama for running local AI models without API costs.
# Great for privacy-focused deployments or testing without cloud dependencies.
#
# Usage:
#   1. Copy this file to your project folder as docker-compose.yml
#   2. Change OPEN_NOTEBOOK_ENCRYPTION_KEY below
#   3. Run: docker compose up -d
#   4. Pull a model: docker exec open_notebook-ollama-1 ollama pull mistral
#   5. Configure Ollama in UI: Settings → API Keys → Add Ollama (URL: http://ollama:11434)

services:
  seekdb:
    image: oceanbase/seekdb:latest
    entrypoint:
      - /bin/bash
      - /root/seekdb-start-fixed.sh
    ports:
      - "2881:2881"
      - "2886:2886"
    environment:
      - ROOT_PASSWORD=${SEEKDB_ROOT_PASSWORD:-SeekDBRoot123!}
      - SEEKDB_DATABASE=${SEEKDB_DATABASE:-open_notebook_ai}
    volumes:
      - seekdb_data:/var/lib/oceanbase
      - ./scripts/seekdb-start-fixed.sh:/root/seekdb-start-fixed.sh:ro
    restart: always
    pull_policy: always

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: always
    pull_policy: always

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: always
    pull_policy: always

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "8502:8502"
      - "5055:5055"
    environment:
      # REQUIRED: Change this to your own secret string
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=change-me-to-a-secret-string

      # Datastore / queue
      - OPEN_NOTEBOOK_SEEKDB_DSN=mysql://root:SeekDBRoot123%21@seekdb:2881/open_notebook_ai
      - OPEN_NOTEBOOK_AI_CONFIG_BACKEND=seekdb
      - OPEN_NOTEBOOK_SEARCH_BACKEND=seekdb
      - OPEN_NOTEBOOK_JOB_BACKEND=arq
      - OPEN_NOTEBOOK_REDIS_URL=redis://redis:6379/0

      # Ollama connection
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - seekdb
      - redis
      - ollama
    restart: always
    pull_policy: always

volumes:
  ollama_models:
  seekdb_data:
